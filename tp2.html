<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Etudiants</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h2 class="text-center mb-4">Liste des étudiants</h2>

        <table class="table table-striped table-hover">
            <thead class="table-light">
                <tr>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody id="tableau">
                <tr><td colspan="3">Chargement...</td></tr>
            </tbody>
        </table>

        <div class="mt-3">
            <a class="btn btn-success" href="create_etudiant.html">Inscrire un étudiant</a>
        </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var req = new XMLHttpRequest();
    req.open('GET', 'http://192.168.1.224/ciel2027/api/etudiants', true);
    req.onload = function() {
        if (req.status >= 200 && req.status < 300) {
            var data;
            try { data = JSON.parse(req.responseText); } catch (e) {
                document.getElementById('tableau').innerHTML = '<tr><td colspan="3">Réponse invalide</td></tr>';
                return;
            }
            var html = '';
            data.forEach(function(val) {
                html += '<tr>';
                html += '<td><a href="./update_etudiant.html?id=' + encodeURIComponent(val.id) + '">' + (val.nom || '') + '</a></td>';
                html += '<td>' + (val.prenom || '') + '</td>';
                html += '<td>' + (val.email || '') + '</td>';
                html += '</tr>';
            });
            document.getElementById('tableau').innerHTML = html || '<tr><td colspan="3">Aucun étudiant</td></tr>';
        } else {
            document.getElementById('tableau').innerHTML = '<tr><td colspan="3">Erreur HTTP ' + req.status + '</td></tr>';
        }
    };
    req.onerror = function() {
        document.getElementById('tableau').innerHTML = '<tr><td colspan="3">Erreur réseau</td></tr>';
    };
    req.send();
});
</script>
</body>
</html>
